<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhật Ký Giấc Ngủ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d1a;
    --deep: #111130;
    --card: #1a1a3a;
    --card2: #141430;
    --accent: #7c6cfc;
    --accent2: #c67be0;
    --moon: #ffe580;
    --text: #e8e6ff;
    --muted: #8884aa;
    --success: #5effa3;
    --glow: rgba(124,108,252,0.25);
    --border: rgba(124,108,252,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 92% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Nebula glow */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(ellipse, rgba(124,108,252,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.8s ease both;
  }

  .moon-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 8px;
    animation: floatMoon 4s ease-in-out infinite;
  }

  @keyframes floatMoon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--moon), var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MONTH SELECTOR */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .month-nav button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent);
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .month-nav button:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px var(--glow);
  }

  .month-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    min-width: 180px;
    text-align: center;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .stat-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px 2px 0 0;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--moon);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* CALENDAR GRID */
  .calendar-section {
    animation: fadeUp 0.6s ease 0.4s both;
  }

  .calendar-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .day-name {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 0;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day-cell {
    aspect-ratio: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 58px;
  }

  .day-cell.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
  }

  .day-cell.today {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(124,108,252,0.3);
  }

  .day-cell:not(.empty):hover {
    border-color: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(198,123,224,0.2);
  }

  .day-cell.has-data {
    background: linear-gradient(135deg, rgba(124,108,252,0.12), rgba(198,123,224,0.08));
    border-color: rgba(124,108,252,0.4);
  }

  .day-cell.has-data.good-sleep {
    background: linear-gradient(135deg, rgba(94,255,163,0.1), rgba(94,255,163,0.06));
    border-color: rgba(94,255,163,0.3);
  }

  .day-cell.has-data.bad-sleep {
    background: linear-gradient(135deg, rgba(255,100,100,0.1), rgba(255,100,100,0.06));
    border-color: rgba(255,100,100,0.3);
  }

  .day-number {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .day-cell.today .day-number {
    color: var(--accent);
    font-weight: 700;
  }

  .sleep-hours {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .day-cell.good-sleep .sleep-hours { color: var(--success); }
  .day-cell.bad-sleep .sleep-hours { color: #ff7070; }

  .sleep-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 0 0 10px 10px;
    transition: width 0.3s ease;
  }

  .day-cell.good-sleep .sleep-bar {
    background: linear-gradient(90deg, var(--success), #2de87a);
  }

  .day-cell.bad-sleep .sleep-bar {
    background: linear-gradient(90deg, #ff7070, #ff4040);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,26,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 380px;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.3s ease;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px var(--glow);
  }

  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .modal-date {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .time-group label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }

  .time-input-wrap {
    position: relative;
  }

  .time-input-wrap .icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    pointer-events: none;
  }

  input[type="time"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    padding: 10px 12px 10px 36px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7);
    cursor: pointer;
  }

  input[type="time"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,108,252,0.15);
  }

  .sleep-preview {
    background: rgba(124,108,252,0.1);
    border: 1px solid rgba(124,108,252,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
    margin-bottom: 20px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sleep-preview .hours-big {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--moon);
  }

  .sleep-preview .hours-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: 6px;
  }

  .sleep-preview .quality {
    font-size: 0.75rem;
    margin-left: 8px;
  }

  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 16px rgba(124,108,252,0.35);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124,108,252,0.5);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }

  .btn-danger {
    background: rgba(255,80,80,0.1);
    color: #ff7070;
    border: 1px solid rgba(255,80,80,0.2);
    font-size: 0.78rem;
    padding: 6px 12px;
    border-radius: 7px;
  }

  .btn-danger:hover {
    background: rgba(255,80,80,0.2);
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--card);
    border: 1px solid var(--success);
    color: var(--success);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s ease 0.5s both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .legend-dot.good { background: var(--success); }
  .legend-dot.mid { background: var(--accent); }
  .legend-dot.bad { background: #ff7070; }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    transition: opacity 0.5s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    color: var(--muted);
    font-size: 0.85rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Existing data indicator */
  .existing-data-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
    .stat-value { font-size: 1.2rem; }
    .day-cell { min-height: 46px; }
    .sleep-hours { display: none; }
    .time-row { grid-template-columns: 1fr; gap: 10px; }
    .modal-actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text">Đang tải dữ liệu...</div>
</div>

<div class="container">
  <header>
    <span class="moon-icon">🌙</span>
    <h1>Nhật Ký Giấc Ngủ</h1>
    <p>Theo dõi thời gian ngủ hàng ngày của bạn</p>
  </header>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Tổng giờ tháng</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvg">—</div>
      <div class="stat-label">TB mỗi đêm</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statDays">0</div>
      <div class="stat-label">Ngày đã ghi</div>
    </div>
  </div>

  <div class="calendar-section">
    <div class="calendar-header-row">
      <div class="day-name">CN</div>
      <div class="day-name">T2</div>
      <div class="day-name">T3</div>
      <div class="day-name">T4</div>
      <div class="day-name">T5</div>
      <div class="day-name">T6</div>
      <div class="day-name">T7</div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot good"></div>
      <span>≥ 7 giờ (đủ giấc)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot mid"></div>
      <span>5–7 giờ (trung bình)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot bad"></div>
      <span>< 5 giờ (thiếu ngủ)</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Chỉnh sửa giấc ngủ</div>
    <div class="modal-date" id="modalDate"></div>

    <div class="existing-data-row" id="existingDataRow" style="display:none">
      <span id="existingDataText"></span>
      <button class="btn btn-danger" onclick="deleteEntry()">Xóa</button>
    </div>

    <div class="time-row">
      <div class="time-group">
        <label>🌙 Giờ ngủ</label>
        <div class="time-input-wrap">
          <input type="time" id="sleepTime" value="22:30" onchange="updatePreview()">
        </div>
      </div>
      <div class="time-group">
        <label>☀️ Giờ thức</label>
        <div class="time-input-wrap">
          <input type="time" id="wakeTime" value="06:30" onchange="updatePreview()">
        </div>
      </div>
    </div>

    <div class="sleep-preview" id="sleepPreview">
      <span class="hours-big" id="previewHours">8.0</span>
      <span class="hours-label">giờ ngủ</span>
      <span class="quality" id="previewQuality">😴 Đủ giấc</span>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="saveEntry()">💾 Lưu</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const FIREBASE_URL = 'https://dotnhachungmay-default-rtdb.asia-southeast1.firebasedatabase.app/sleep-tracker';

  let currentDate = new Date();
  let currentYear = currentDate.getFullYear();
  let currentMonth = currentDate.getMonth();
  let monthData = {};
  let selectedDay = null;

  const MONTHS_VI = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

  function getMonthKey() {
    return `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
  }

  async function loadMonthData() {
    const key = getMonthKey();
    try {
      const res = await fetch(`${FIREBASE_URL}/${key}.json`);
      const data = await res.json();
      monthData = data || {};
    } catch (e) {
      monthData = {};
      showToast('⚠️ Không thể tải dữ liệu', true);
    }
  }

  async function saveMonthData() {
    const key = getMonthKey();
    try {
      await fetch(`${FIREBASE_URL}/${key}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(monthData)
      });
    } catch (e) {
      showToast('⚠️ Không thể lưu dữ liệu', true);
      throw e;
    }
  }

  function calcHours(sleepTime, wakeTime) {
    const [sh, sm] = sleepTime.split(':').map(Number);
    const [wh, wm] = wakeTime.split(':').map(Number);
    let sleepMins = sh * 60 + sm;
    let wakeMins = wh * 60 + wm;
    if (wakeMins <= sleepMins) wakeMins += 24 * 60;
    return (wakeMins - sleepMins) / 60;
  }

  function getQuality(hours) {
    if (hours >= 7) return { label: '😴 Đủ giấc', cls: 'good' };
    if (hours >= 5) return { label: '😐 Trung bình', cls: 'mid' };
    return { label: '😵 Thiếu ngủ', cls: 'bad' };
  }

  function updatePreview() {
    const s = document.getElementById('sleepTime').value;
    const w = document.getElementById('wakeTime').value;
    if (!s || !w) return;
    const h = calcHours(s, w);
    const q = getQuality(h);
    document.getElementById('previewHours').textContent = h.toFixed(1);
    document.getElementById('previewQuality').textContent = q.label;
  }

  function renderCalendar() {
    const label = `${MONTHS_VI[currentMonth]} ${currentYear}`;
    document.getElementById('monthLabel').textContent = label;

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date();

    // Empty cells
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const dayKey = String(d).padStart(2, '0');
      const entry = monthData[dayKey];
      const isToday = today.getDate() === d && today.getMonth() === currentMonth && today.getFullYear() === currentYear;

      cell.className = 'day-cell';
      if (isToday) cell.classList.add('today');

      if (entry) {
        const q = getQuality(entry.hours);
        cell.classList.add('has-data', q.cls === 'good' ? 'good-sleep' : q.cls === 'bad' ? 'bad-sleep' : '');
        const barWidth = Math.min(100, (entry.hours / 10) * 100);

        cell.innerHTML = `
          <div class="day-number">${d}</div>
          <div class="sleep-hours">${entry.hours.toFixed(1)}h</div>
          <div class="sleep-bar" style="width:${barWidth}%"></div>
        `;
      } else {
        cell.innerHTML = `<div class="day-number">${d}</div>`;
      }

      cell.addEventListener('click', () => openModal(d));
      grid.appendChild(cell);
    }

    updateStats();
  }

  function updateStats() {
    const entries = Object.values(monthData);
    if (entries.length === 0) {
      document.getElementById('statTotal').textContent = '0h';
      document.getElementById('statAvg').textContent = '—';
      document.getElementById('statDays').textContent = '0';
      return;
    }
    const total = entries.reduce((s, e) => s + e.hours, 0);
    const avg = total / entries.length;
    document.getElementById('statTotal').textContent = `${total.toFixed(0)}h`;
    document.getElementById('statAvg').textContent = `${avg.toFixed(1)}h`;
    document.getElementById('statDays').textContent = entries.length;
  }

  function openModal(day) {
    selectedDay = day;
    const dayKey = String(day).padStart(2, '0');
    const dateStr = `Ngày ${day} ${MONTHS_VI[currentMonth]} ${currentYear}`;
    const entry = monthData[dayKey];

    document.getElementById('modalTitle').textContent = entry ? 'Chỉnh sửa giấc ngủ' : 'Thêm giấc ngủ';
    document.getElementById('modalDate').textContent = dateStr;

    if (entry) {
      document.getElementById('sleepTime').value = entry.sleep;
      document.getElementById('wakeTime').value = entry.wake;
      document.getElementById('existingDataRow').style.display = 'flex';
      document.getElementById('existingDataText').textContent = `Đã lưu: ${entry.sleep} → ${entry.wake} (${entry.hours.toFixed(1)}h)`;
    } else {
      document.getElementById('sleepTime').value = '22:30';
      document.getElementById('wakeTime').value = '06:30';
      document.getElementById('existingDataRow').style.display = 'none';
    }

    updatePreview();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    selectedDay = null;
  }

  async function saveEntry() {
    const s = document.getElementById('sleepTime').value;
    const w = document.getElementById('wakeTime').value;
    if (!s || !w) return;

    const hours = calcHours(s, w);
    const dayKey = String(selectedDay).padStart(2, '0');

    monthData[dayKey] = { sleep: s, wake: w, hours };

    try {
      await saveMonthData();
      closeModal();
      renderCalendar();
      showToast('✅ Đã lưu thành công!');
    } catch (e) {}
  }

  async function deleteEntry() {
    const dayKey = String(selectedDay).padStart(2, '0');
    delete monthData[dayKey];

    try {
      await saveMonthData();
      closeModal();
      renderCalendar();
      showToast('🗑️ Đã xóa dữ liệu');
    } catch (e) {}
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    init();
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? '#ff7070' : 'var(--success)';
    t.style.color = isError ? '#ff7070' : 'var(--success)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  async function init() {
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.remove('hidden');
    await loadMonthData();
    renderCalendar();
    overlay.classList.add('hidden');
  }

  init();
</script>
</body>
</html>
